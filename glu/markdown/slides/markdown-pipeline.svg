<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" font-family="sans">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- 1. .md file — document shape -->
  <g transform="translate(90,8)">
    <polygon fill="#fff8f0" stroke="#95683a" stroke-width="1.3" points="0,4 0,32 160,32 160,18 142,0 0,0 0,4"/>
    <polyline points="142,0 142,18 160,18" fill="none" stroke="#95683a" stroke-width="1"/>
    <text font-weight="600" text-anchor="middle" font-size="12" fill="#7a5020" x="80" y="21">.md file</text>
  </g>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="42" x2="170" y2="56"/>

  <!-- 2. Frontmatter — step -->
  <rect fill="#f0f4f8" stroke="#1a3a5c" stroke-width="1.3" x="90" y="58" width="160" height="30" rx="5"/>
  <text font-weight="600" text-anchor="middle" font-size="12" fill="#1a3a5c" x="170" y="78">frontmatter</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="88" x2="170" y2="102"/>

  <!-- 3. Companion .lua — document shape -->
  <g transform="translate(90,104)">
    <polygon fill="#fff8f0" stroke="#95683a" stroke-width="1.3" points="0,4 0,32 160,32 160,18 142,0 0,0 0,4"/>
    <polyline points="142,0 142,18 160,18" fill="none" stroke="#95683a" stroke-width="1"/>
    <text font-weight="600" text-anchor="middle" font-size="12" fill="#7a5020" x="80" y="21">companion .lua</text>
  </g>
  <line stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2" x1="252" y1="120" x2="280" y2="120"/>
  <text fill="#999" font-size="10" x="285" y="124">callbacks registered</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="138" x2="170" y2="152"/>

  <!-- 4. Read aux — data (cylinder) -->
  <g transform="translate(90,154)">
    <path fill="#f0f0f8" stroke="#6a5a8c" stroke-width="1.3" d="M 0,6 C 0,-2 160,-2 160,6 L 160,26 C 160,34 0,34 0,26 Z"/>
    <ellipse cx="80" cy="6" rx="80" ry="7" fill="none" stroke="#6a5a8c" stroke-width="1.3"/>
    <text font-weight="600" text-anchor="middle" font-size="12" fill="#5a4a7c" x="80" y="24">read aux</text>
  </g>
  <line stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2" x1="252" y1="174" x2="280" y2="174"/>
  <text fill="#999" font-size="10" x="285" y="178">_aux / _toc available</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="190" x2="170" y2="204"/>

  <!-- 5. Lua blocks — step -->
  <rect fill="#f0f4f8" stroke="#1a3a5c" stroke-width="1.3" x="90" y="206" width="160" height="30" rx="5"/>
  <text font-weight="600" text-anchor="middle" font-size="12" fill="#1a3a5c" x="170" y="226">Lua blocks</text>
  <line stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2" x1="252" y1="214" x2="280" y2="214"/>
  <text fill="#999" font-size="10" x="285" y="211">return values</text>
  <text fill="#999" font-size="10" x="285" y="224">start/stoprecording</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="236" x2="170" y2="250"/>

  <!-- 6. Inline expressions — step -->
  <rect fill="#f0f4f8" stroke="#1a3a5c" stroke-width="1.3" x="90" y="252" width="160" height="30" rx="5"/>
  <text font-weight="600" text-anchor="middle" font-size="12" fill="#1a3a5c" x="170" y="272">inline expressions</text>
  <line stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2" x1="252" y1="267" x2="280" y2="267"/>
  <text fill="#999" font-size="10" x="285" y="271">{= expr =}</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="282" x2="170" y2="296"/>

  <!-- 7. goldmark — step -->
  <rect fill="#f0f4f8" stroke="#1a3a5c" stroke-width="1.3" x="90" y="298" width="160" height="30" rx="5"/>
  <text font-weight="600" text-anchor="middle" font-size="12" fill="#1a3a5c" x="170" y="318">goldmark</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="328" x2="170" y2="342"/>

  <!-- 8. HTML — step -->
  <rect fill="#f8f4f0" stroke="#1a3a5c" stroke-width="1.3" x="90" y="344" width="160" height="30" rx="5"/>
  <text font-weight="600" text-anchor="middle" font-size="12" fill="#1a3a5c" x="170" y="364">HTML</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="374" x2="170" y2="388"/>

  <!-- 9. htmlbag — step -->
  <rect fill="#f0f4f8" stroke="#1a3a5c" stroke-width="1.3" x="90" y="390" width="160" height="30" rx="5"/>
  <text font-weight="600" text-anchor="middle" font-size="12" fill="#1a3a5c" x="170" y="410">htmlbag</text>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="420" x2="170" y2="434"/>

  <!-- 10. PDF — output document shape -->
  <g transform="translate(90,436)">
    <polygon fill="#e8f0e8" stroke="#2d6a4f" stroke-width="1.5" points="0,4 0,34 160,34 160,18 142,0 0,0 0,4"/>
    <polyline points="142,0 142,18 160,18" fill="none" stroke="#2d6a4f" stroke-width="1.3"/>
    <text font-weight="600" text-anchor="middle" font-size="12" fill="#2d6a4f" x="80" y="23">PDF</text>
  </g>
  <line stroke="#aaa" stroke-width="1.3" marker-end="url(#arrow)" x1="170" y1="472" x2="170" y2="486"/>

  <!-- 11. Write aux — data (cylinder) -->
  <g transform="translate(90,488)">
    <path fill="#f0f0f8" stroke="#6a5a8c" stroke-width="1.3" d="M 0,6 C 0,-2 160,-2 160,6 L 160,26 C 160,34 0,34 0,26 Z"/>
    <ellipse cx="80" cy="6" rx="80" ry="7" fill="none" stroke="#6a5a8c" stroke-width="1.3"/>
    <text font-weight="600" text-anchor="middle" font-size="12" fill="#5a4a7c" x="80" y="24">write aux</text>
  </g>
  <line stroke="#ccc" stroke-width="0.8" stroke-dasharray="3 2" x1="252" y1="508" x2="280" y2="508"/>
  <text fill="#999" font-size="10" x="285" y="512">_aux saved</text>

  <!-- Feedback arrow from write aux back to read aux -->
  <path stroke="#bab" stroke-width="0.8" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)" d="M 90,508 L 50,508 L 50,174 L 88,174"/>

</svg>
