<!DOCTYPE html>
<!--
  Demonstrates CBDT/CBLC color-bitmap glyph rendering. Like sbix, CBDT
  embeds one PNG per glyph per strike, but with a more sophisticated
  index structure (IndexSubtable formats 1/3 etc.) and platform origin
  on Google.

  This subset of NotoColorEmoji ships SIL OFL 1.1, so it is bundled.
  The subset only carries five glyphs: '8' (U+0038), '9' (U+0039),
  '®' (U+00AE), '⁉' (U+2049) and '⃣' (U+20E3 enclosing keycap). The
  ZWJ-and-keycap combination '8⃣' / '9⃣' would normally render as one
  composite glyph via GSUB; the subset does not carry the substitution
  rules, so the keycap appears next to the digit as a separate atom.
-->
<html lang="en">
<head>
  <style>
    @page { size: A5; margin: 1.6cm; }
    @font-face {
      font-family: "Noto";
      src: url("NotoColorEmoji.subset.ttf");
    }
    body { font-family: sans-serif; font-size: 11pt; line-height: 1.5; }
    h1 { font-size: 16pt; margin: 0 0 0.4em 0; }
    h2 { font-size: 11pt; font-weight: bold; margin: 1.1em 0 0.3em 0; color: #2b4a6b; }
    .sample { font-family: "Noto"; line-height: 1.2; }
    .small  { font-size: 14pt; }
    .medium { font-size: 36pt; }
    .large  { font-size: 72pt; }
  </style>
</head>
<body>
  <h1>CBDT color bitmap (Noto subset)</h1>
  <h2>14pt</h2>
  <p class="sample small">8 9 ® ⁉</p>
  <h2>36pt</h2>
  <p class="sample medium">8 9 ®</p>
  <h2>72pt</h2>
  <p class="sample large">⁉</p>
</body>
</html>
